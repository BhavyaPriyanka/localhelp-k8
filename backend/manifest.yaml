apiVersion: v1
kind: ConfigMap
metadata:
  name: backend
  namespace: localhelp
data:
  DB_HOST: mysql # this is mysql component service name

---
kind: Deployment
apiVersion: apps/v1

metadata:
  name: backend
  namespace: localhelp
  labels:
    app: backend
    purpose: deployment
    tier: backend-app
    project: localhelp


spec:
  replicas: 2

  selector:
    matchLabels:
     app: backend
     purpose: deployment
     tier: backend-app
     project: localhelp

  template:
    metadata:
      labels:
        app: backend
        purpose: deployment
        tier: backend-app
        project: localhelp
     
    spec:
      containers:
       - name: backend
         image: sbp828/backend:v1.0
         envFrom: 
          - configMapRef:
             name: backend
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: localhelp
spec:
  selector:
    app: backend
    purpose: deployment
    tier: backend-app
    project: localhelp
  ports:
  - protocol: TCP
    port: 8080 #service-port
    targetPort: 8080 #target-port
