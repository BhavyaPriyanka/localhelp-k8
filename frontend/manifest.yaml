apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend
  namespace: localhelp
data:
  nginx.conf: |
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8080/;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        stub_status on;
        access_log off;
    }

---
kind: Deployment
apiVersion: apps/v1

metadata:
  name: frontend
  namespace: localhelp
  labels:
    app: frontend
    purpose: deployment
    tier: frontend-app
    project: localhelp


spec:
  replicas: 2

  selector:
    matchLabels:
     app: frontend
     purpose: deployment
     tier: frontend-app
     project: localhelp

  template:
    metadata:
      labels:
        app: frontend
        purpose: deployment
        tier: frontend-app
        project: localhelp
     
    spec:
      containers:
       - name: frontend
         image: sbp828/frontend:v1.0
         volumeMounts:
          - name: nginx-conf
            mountPath: /etc/nginx/nginx.conf
            subPath: nginx.conf
            readOnly: true
      volumes:
        - name: nginx-conf
          configMap:
            name: frontend
            items:
             - key: nginx.conf
               path: nginx.conf 




---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: localhelp
spec:
  type: LoadBalancer
  selector:
    app: frontend
    purpose: deployment
    tier: frontend-app
    project: localhelp
  ports:
  - protocol: TCP
    port: 80 #service-port
    targetPort: 80 #target-port
