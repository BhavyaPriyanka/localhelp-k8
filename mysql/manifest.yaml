apiVersion: apps/v1
kind: Deployment

metadata:
  name: mysql
  namespace: localhelp
  labels:
    app: mysql
    purpose: deployment
    tier: database
    project: localhelp
spec:
  replicas: 2

  selector:
      matchLabels:
        app: mysql
        tier: database
        project: localhelp
  template:
     metadata:
      labels:
        app: mysql
        tier: database
        project: localhelp
      spec:
       containers:
        - name: mysql
          image: sbp828/mysql:v1.0

---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: localhelp
spec:
  selector:
    app: mysql
    tier: database
    project: localhelp
  ports:
  - protocol: TCP
    port: 3306 #service-port
    targetPort: 3306 #target-port